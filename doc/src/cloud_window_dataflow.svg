<svg xmlns="http://www.w3.org/2000/svg" width="430" viewBox="0 0 430 600" role="img">
  <title>FAST-LIO to cloud window data flow</title>
  <desc>Lidar, IMU and clock from a bag or the Mid360 driver feed FAST-LIO; FAST-LIO publishes the registered point cloud in the world frame. The cloud_window node buffers the last N seconds of that cloud and republishes it as a single PointCloud2 on /cloud_window, which feeds a downstream path-planning stage that is outside the scope of this guide.</desc>
  <style>
    text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .h { font-size: 14px; font-weight: 600; }
    .s { font-size: 12px; }
    .lbl { font-size: 12px; fill: #5F5E5A; }
    .edge { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
    @media (prefers-color-scheme: dark) {
      .lbl { fill: #B4B2A9; }
      .edge { stroke: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path class="edge" d="M2 1L8 5L2 9" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="90" y="40" width="250" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="h" x="215" y="60" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Data source</text>
  <text class="s" x="215" y="78" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">rosbag2 --clock / Mid360 driver</text>

  <line class="edge" x1="215" y1="92" x2="215" y2="184" marker-end="url(#arrow)"/>
  <text class="lbl" x="228" y="112">/livox/lidar &#183; CustomMsg</text>
  <text class="lbl" x="228" y="128">/livox/imu &#183; sensor_msgs/Imu</text>
  <text class="lbl" x="228" y="144">/clock &#183; rosgraph_msgs/Clock</text>

  <rect x="90" y="188" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="h" x="215" y="206" text-anchor="middle" dominant-baseline="central" fill="#04342C">FAST-LIO</text>
  <text class="s" x="215" y="226" text-anchor="middle" dominant-baseline="central" fill="#085041">/laser_mapping</text>

  <line class="edge" x1="215" y1="244" x2="215" y2="356" marker-end="url(#arrow)"/>
  <text class="lbl" x="228" y="274">/cloud_registered</text>
  <text class="lbl" x="228" y="290">PointCloud2 &#183; world frame</text>
  <text class="lbl" x="228" y="306">frame: camera_init</text>

  <rect x="90" y="360" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="h" x="215" y="378" text-anchor="middle" dominant-baseline="central" fill="#04342C">cloud_window</text>
  <text class="s" x="215" y="398" text-anchor="middle" dominant-baseline="central" fill="#085041">last N s &#183; /cloud_window</text>

  <line class="edge" x1="215" y1="416" x2="215" y2="500" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text class="lbl" x="228" y="446">/cloud_window</text>
  <text class="lbl" x="228" y="462">PointCloud2</text>

  <!-- Downstream stage, out of scope for this guide: dashed + semi-transparent -->
  <g opacity="0.45">
    <rect x="90" y="504" width="250" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text class="h" x="215" y="532" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Path planning</text>
  </g>
</svg>
